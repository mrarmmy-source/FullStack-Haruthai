<app-customer-sidebar></app-customer-sidebar>
<div class="page-content">
  <div *ngIf="user" class="profile-wrap">
      <!-- Profile Card -->
      <div class="profile-card">
        <!-- Avatar -->
        <div class="avatar">
          {{ initial }}
        </div>

        <!-- Name -->
        <h1 class="profile-name">{{ user.full_name }}</h1>

        <!-- Info rows -->
        <div class="info-list">
          <div class="info-row" *ngIf="user.phone_number">
            <div class="info-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
              </svg>
            </div>
            <span>{{ user.phone_number }}</span>
          </div>

          <div class="info-row" *ngIf="user.email">
            <div class="info-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <span>{{ user.email }}</span>
          </div>

          <div class="info-row" *ngIf="user.created_at">
            <div class="info-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
            </div>
            <span>Member since {{ user.created_at | date:'dd MMM yyyy' }}</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Logout -->
        <button class="btn-logout" (click)="logout()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </button>
      </div>
    </div>
</div>
