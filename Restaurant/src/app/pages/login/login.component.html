<div class="page">

  <!-- Left panel — branding -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="deco-line"></div>
      <p class="brand-tagline">Welcome to</p>
      <h1 class="brand-name">Ha-ru-thai</h1>
      <p class="brand-sub">Authentic Taste of Happiness</p>
      <div class="deco-line"></div>
    </div>
    <div class="brand-overlay"></div>
    <img
      src="https://images.unsplash.com/photo-1562565652-a0d8f0c59eb4?w=1200&q=80"
      alt="Thai cuisine" class="brand-bg">
  </div>

  <!-- Right panel — form -->
  <div class="form-panel">
    <div class="form-card">

      <div class="form-header">
        <span class="logo-mark">✿</span>
        <h2>Sign In</h2>
        <p>Access your account to continue</p>
      </div>

      <!-- Role toggle -->
      <div class="role-toggle">
        <button class="role-btn" [class.role-btn--active]="currentRole === 'customer'"
          (click)="setRole('customer')">Customer</button>
        <button class="role-btn" [class.role-btn--active]="currentRole === 'staff'"
          (click)="setRole('staff')">Staff</button>
      </div>

      <form (ngSubmit)="handleLogin()">
        <div class="field">
          <label>{{ currentRole === 'staff' ? 'Username' : 'Phone Number' }}</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input type="text" name="username" [(ngModel)]="loginData.username"
              [placeholder]="currentRole === 'staff' ? 'Enter username' : 'Enter phone number'" required>
          </div>
        </div>

        <div class="field">
          <label>{{ currentRole === 'staff' ? 'Password' : 'PIN' }}</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input type="password" name="password" [(ngModel)]="loginData.password"
              [placeholder]="currentRole === 'staff' ? 'Enter password' : 'Enter PIN'" required>
          </div>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>

      <p class="signup-link">Don't have an account? <a routerLink="/register">Create one</a></p>

      <div class="hint">
        <span class="hint-label">Demo credentials</span>
        Staff: <strong>admin</strong> / <strong>1234</strong>
      </div>

    </div>
  </div>

</div>
