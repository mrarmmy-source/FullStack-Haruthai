<div class="login-container">
  <div class="card">
    <div class="logo-icon">✿</div>
    <h2>Ha-ru-thai</h2>
    <div class="subtitle">Authentic Taste of Happiness</div>

    <div class="role-selector">
      <button class="role-btn" 
              [ngClass]="{'active': currentRole === 'customer'}" 
              (click)="setRole('customer')">ลูกค้า</button>
      <button class="role-btn" 
              [ngClass]="{'active': currentRole === 'staff'}" 
              (click)="setRole('staff')">พนักงาน</button>
    </div>

    <form (ngSubmit)="handleLogin()">
      <div class="form-group">
        <label>อีเมล หรือ เบอร์โทรศัพท์</label>
        <div class="input-with-icon">
          <span>👤</span>
          <input type="text" name="username" [(ngModel)]="loginData.username" placeholder="กรอกข้อมูลที่นี่" required>
        </div>
      </div>

      <div class="form-group">
        <label>รหัสผ่าน</label>
        <div class="input-with-icon">
          <span>🔒</span>
          <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="กรอกรหัสผ่าน" required>
        </div>
      </div>

      <div style="text-align: right; margin-bottom: 20px;">
        <a href="#" style="color: #888; text-decoration: none; font-size: 0.85rem;">ลืมรหัสผ่าน?</a>
      </div>

      <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
    </form>

    <div class="divider"><span>หรือ</span></div>

    <div class="links">
      ยังไม่มีบัญชี? <a href="#">สมัครสมาชิกเลย</a>
    </div>
  </div>
  
  <div class="hint-box">
    <strong>ทดสอบระบบ:</strong><br>
    พนักงาน: admin / 1234<br>
    ลูกค้า: ใช้เบอร์โทรและ PIN ที่มีใน Supabase
  </div>
</div>
