<div class="page">

  <!-- Left panel — branding -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="deco-line"></div>
      <p class="brand-tagline">Join Us</p>
      <h1 class="brand-name">Ha-ru-thai</h1>
      <p class="brand-sub">Authentic Taste of Happiness</p>
      <div class="deco-line"></div>
    </div>
    <div class="brand-overlay"></div>
    <img
      src="https://images.unsplash.com/photo-1559314809-0d155014e29e?w=1200&q=80"
      alt="Thai cuisine" class="brand-bg">
  </div>

  <!-- Right panel — form -->
  <div class="form-panel">
    <div class="form-card">

      @if (!isSuccess) {

        <div class="form-header">
          <span class="logo-mark">✿</span>
          <h2>Create Account</h2>
          <p>Fill in your details to get started</p>
        </div>

        <div class="field">
          <label>Full Name</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input type="text" [(ngModel)]="user.fullname"
              [class.invalid]="!user.fullname && submitted"
              placeholder="Enter your full name">
          </div>
        </div>

        <div class="field">
          <label>Phone Number</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            <input type="tel" [(ngModel)]="user.phone"
              [class.invalid]="!user.phone && submitted"
              placeholder="Enter phone number">
          </div>
        </div>

        <div class="field">
          <label>Email <span class="optional">(optional)</span></label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="email" [(ngModel)]="user.email" placeholder="Enter email address">
          </div>
        </div>

        <div class="field">
          <label>PIN</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input type="password" [(ngModel)]="user.pin"
              [class.invalid]="!user.pin && submitted"
              placeholder="Set a 4-digit PIN" maxlength="4">
          </div>
        </div>

        <button class="btn-primary" (click)="onRegister()" [disabled]="loading">
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>

        <div class="divider"><span>or</span></div>

        <p class="signin-link">Already have an account? <a routerLink="/login">Sign in</a></p>

      } @else {

        <div class="success">
          <div class="success-icon">✓</div>
          <h2>Account Created!</h2>
          <p>Welcome, <strong>{{ user.fullname }}</strong>. Your account is ready.</p>
          <button class="btn-primary" (click)="goToLogin()">Continue to Sign In</button>
        </div>

      }

    </div>
  </div>

</div>
