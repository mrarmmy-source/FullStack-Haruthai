<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" [class.sidebar--open]="sidebarOpen">

  <!-- Logo -->
  <div class="sidebar__logo">
    <h1 class="sidebar__title">Ha-ru-thai</h1>
    <p class="sidebar__subtitle">Staff Dashboard</p>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    <a *ngFor="let item of navItems"
      href="#"
      class="nav-link"
      [class.nav-link--active]="item.active"
      (click)="onNavClick($event, item)">
      <svg class="nav-link__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="item.icon"/>
      </svg>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar__footer">
    <div class="sidebar__user-info">
      <div class="sidebar__avatar">A</div>
      <div>
        <p class="sidebar__user-name">Admin</p>
        <p class="sidebar__user-email">Staff Account</p>
      </div>
    </div>
    <button class="sidebar__logout" (click)="logout()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span>Sign Out</span>
    </button>
  </div>
</aside>

<!-- Mobile toggle -->
<button class="mobile-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
  </svg>
</button>

<!-- ===== MAIN ===== -->
<main class="main-content">

  <!-- Hero / Slideshow -->
  <section class="hero">

    <!-- Slides -->
    <div class="hero__slides">
      <div *ngFor="let slide of slides; let i = index"
        class="hero__slide"
        [class.hero__slide--active]="currentSlide === i">
        <img [src]="slide.image" [alt]="slide.alt" class="hero__image"
          [attr.loading]="i === 0 ? 'eager' : 'lazy'">
      </div>
    </div>

    <!-- Gradient overlays -->
    <div class="hero__overlay hero__overlay--top"></div>
    <div class="hero__overlay hero__overlay--sides"></div>

    <!-- Center content -->
    <div class="hero__content">
      <div class="deco-line animate-scale-in"></div>

      <h2 class="hero__subtitle animate-fade-up">Welcome back to</h2>

      <h1 class="hero__title animate-fade-up delay-1">Ha-ru-thai</h1>

      <p class="hero__desc animate-fade-up delay-2">
        Manage your restaurant — menus, bookings, orders, and payments
      </p>

      <div class="deco-line animate-scale-in delay-2" style="margin-top: 3rem;"></div>
    </div>

    <!-- Slide dots -->
    <div class="hero__dots">
      <button *ngFor="let slide of slides; let i = index"
        class="dot"
        [class.dot--active]="currentSlide === i"
        [attr.aria-label]="'Slide ' + (i + 1)"
        (click)="goToSlide(i)">
      </button>
    </div>

  </section>

</main>
