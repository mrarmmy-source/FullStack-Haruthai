<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Payments</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="admin_payments.css">

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            sans: ['DM Sans', 'sans-serif']
          },
          colors: {
            bg: '#0a0a0a',
            surface: '#141414',
            card: '#1a1a1a',
            border: '#2a2a2a',
            muted: '#6b6b6b',
            fg: '#e8e8e8',
            accent: '#c9a86c',
            success: '#4ade80',
            warning: '#fbbf24'
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen">
  <div class="fixed inset-0 bg-gradient-to-br from-bg via-surface to-bg pointer-events-none"></div>

  <div class="relative flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="p-6 border-b border-border">
        <h1 class="logo">Savoria</h1>
        <p class="text-xs text-muted mt-1">Admin Panel</p>
      </div>

      <nav class="p-4 space-y-1 flex-1">
        <a href="#" class="sidebar-link">All Orders</a>
        <a href="#" class="sidebar-link active">Payments</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="max-w-6xl mx-auto">

        <!-- Stats -->
        <div class="stats-grid">
          <div class="card"><p>Total Sales</p><h2 id="t1">฿0</h2></div>
          <div class="card"><p>Completed</p><h2 id="t2" class="text-success">฿0</h2></div>
          <div class="card"><p>Pending</p><h2 id="t3" class="text-warning">฿0</h2></div>
          <div class="card"><p>Transactions</p><h2 id="t4">0</h2></div>
        </div>

        <!-- Table -->
        <div class="table-box">
          <table class="w-full">
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="table"></tbody>
          </table>
        </div>

      </div>
    </main>

  </div>

  <!-- JS -->
  <script src="admin_payments.js"></script>
</body>
</html>
